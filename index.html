<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fish Pond Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🐟 SMART FARM</h1>
            <h2>Fish Pond Monitoring System</h2>
            <p class="matric">2021/1/81764CM</p>
        </header>

        <!-- Dashboard Cards -->
        <div class="dashboard">
            <div class="card temperature">
                <div class="icon">🌡️</div>
                <div class="label">Temperature</div>
                <div class="value" id="temperature">--</div>
                <div class="unit">°C</div>
                <div class="status" id="tempStatus">--</div>
            </div>

            <div class="card ph">
                <div class="icon">🧪</div>
                <div class="label">pH Level</div>
                <div class="value" id="ph">--</div>
                <div class="unit">pH</div>
                <div class="status" id="phStatus">--</div>
            </div>

            <div class="card tds">
                <div class="icon">💧</div>
                <div class="label">TDS</div>
                <div class="value" id="tds">--</div>
                <div class="unit">ppm</div>
                <div class="status" id="tdsStatus">--</div>
            </div>

            <div class="card signal">
                <div class="icon">📶</div>
                <div class="label">Signal</div>
                <div class="value" id="signal">--</div>
                <div class="unit">dBm</div>
                <div class="status" id="signalStatus">--</div>
            </div>
        </div>

        <!-- Info -->
        <div class="info">
            <p>Last Updated: <span id="timestamp">Waiting...</span></p>
            <p>Packets Received: <span id="packets">0</span></p>
        </div>

        <!-- History Section -->
        <div class="history-section">
            <h3>📜 Last 10 Readings (<span id="historyCount">0</span>)</h3>
            <div class="table-wrapper">
                <table id="historyTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>🌡️ Temp</th>
                            <th>🧪 pH</th>
                            <th>💧 TDS</th>
                            <th>🕐 Time</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <tr>
                            <td colspan="5" style="text-align:center; padding: 20px; color: #8a9aa8;">
                                ⏳ Loading history...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <footer>
            <p>SMART FARM © 2026 | 2021/1/81764CM</p>
        </footer>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
